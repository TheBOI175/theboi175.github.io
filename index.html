<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remote Desktop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #2a2a2a;
      padding: 15px 20px;
      border-bottom: 1px solid #3a3a3a;
      flex-shrink: 0;
    }
    .connection-bar {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    input {
      flex: 1;
      padding: 10px;
      background: #333;
      border: 1px solid #444;
      color: #fff;
      border-radius: 4px;
      font-size: 14px;
    }
    button {
      padding: 10px 20px;
      background: #0066cc;
      border: none;
      color: white;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    button:hover { background: #0052a3; }
    button:disabled { background: #444; cursor: not-allowed; }
    button.disconnect { background: #d32f2f; }
    .status {
      margin-top: 8px;
      font-size: 12px;
      color: #888;
    }
    .status.connected { color: #4caf50; }
    .status.error { color: #f44336; }
    .viewport {
      flex: 1;
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #canvas {
      display: none;
      cursor: none;
      touch-action: none;
    }
    .placeholder {
      text-align: center;
      color: #666;
    }
    .stats {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.8);
      padding: 10px;
      border-radius: 6px;
      font-size: 11px;
      font-family: monospace;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="connection-bar">
      <input type="text" id="wsUrl" placeholder="wss://your-tunnel.trycloudflare.com/ws?token=TOKEN">
      <button id="connectBtn">Connect</button>
    </div>
    <div class="status" id="status">Disconnected</div>
  </div>
  
  <div class="viewport" id="viewport">
    <div class="placeholder" id="placeholder">
      <h2>🖥️ Not Connected</h2>
      <p>Enter server URL above</p>
    </div>
    <canvas id="canvas"></canvas>
    <div class="stats" id="stats" style="display: none;">
      Latency: <span id="latency">--</span>ms | FPS: <span id="fps">--</span> | <span id="resolution">--</span>
    </div>
  </div>

  <script>
    let ws, connected = false, pingInterval, lastPing = 0;
    let frameCount = 0, lastFrameTime = Date.now();
    let remoteWidth = 0, remoteHeight = 0;

    const wsUrlInput = document.getElementById('wsUrl');
    const connectBtn = document.getElementById('connectBtn');
    const statusDiv = document.getElementById('status');
    const placeholder = document.getElementById('placeholder');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const viewport = document.getElementById('viewport');
    const statsDiv = document.getElementById('stats');

    const savedUrl = localStorage.getItem('wsUrlBase');
    if (savedUrl) wsUrlInput.value = savedUrl;

    function resizeCanvas() {
      if (!remoteWidth || !remoteHeight) return;
      
      const vw = viewport.clientWidth;
      const vh = viewport.clientHeight;
      const remoteAspect = remoteWidth / remoteHeight;
      const viewportAspect = vw / vh;
      
      let w, h;
      if (viewportAspect > remoteAspect) {
        h = vh;
        w = h * remoteAspect;
      } else {
        w = vw;
        h = w / remoteAspect;
      }
      
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      console.log(`Canvas sized to ${w}x${h} for viewport ${vw}x${vh}`);
    }

    window.addEventListener('resize', resizeCanvas);

    function setStatus(msg, cls) {
      statusDiv.textContent = msg;
      statusDiv.className = 'status ' + (cls || '');
    }

    function disconnect() {
      if (ws) ws.close();
      if (pingInterval) clearInterval(pingInterval);
      ws = null;
      connected = false;
      canvas.style.display = 'none';
      placeholder.style.display = 'block';
      statsDiv.style.display = 'none';
      connectBtn.textContent = 'Connect';
      connectBtn.className = '';
      setStatus('Disconnected');
    }

    function connect() {
      const url = wsUrlInput.value.trim();
      if (!url) return setStatus('Enter URL', 'error');

      localStorage.setItem('wsUrlBase', url.split('?token=')[0]);
      connectBtn.disabled = true;
      setStatus('Connecting...');

      ws = new WebSocket(url);
      
      ws.onopen = function() {
        setStatus('Connected', 'connected');
        connected = true;
        connectBtn.textContent = 'Disconnect';
        connectBtn.className = 'disconnect';
        connectBtn.disabled = false;
        statsDiv.style.display = 'block';
        
        lastPing = Date.now();
        ws.send(JSON.stringify({ type: 'ping' }));
        pingInterval = setInterval(function() {
          if (ws && ws.readyState === 1) {
            lastPing = Date.now();
            ws.send(JSON.stringify({ type: 'ping' }));
          }
        }, 5000);
      };

      ws.onmessage = function(e) {
        const msg = JSON.parse(e.data);
        
        if (msg.type === 'init') {
          remoteWidth = msg.width;
          remoteHeight = msg.height;
          canvas.width = msg.width;
          canvas.height = msg.height;
          document.getElementById('resolution').textContent = msg.width + 'x' + msg.height;
          canvas.style.display = 'block';
          placeholder.style.display = 'none';
          resizeCanvas();
        } else if (msg.type === 'frame') {
          const img = new Image();
          img.onload = function() {
            ctx.drawImage(img, 0, 0);
            frameCount++;
          };
          img.src = 'data:image/jpeg;base64,' + msg.data;
        } else if (msg.type === 'pong') {
          document.getElementById('latency').textContent = Date.now() - lastPing;
        }
      };

      ws.onerror = () => setStatus('Connection error', 'error');
      ws.onclose = disconnect;
    }

    setInterval(function() {
      if (connected) {
        const now = Date.now();
        const delta = (now - lastFrameTime) / 1000;
        if (delta > 0) {
          document.getElementById('fps').textContent = Math.round(frameCount / delta);
          frameCount = 0;
          lastFrameTime = now;
        }
      }
    }, 1000);

    connectBtn.onclick = () => connected ? disconnect() : connect();

    function getCoords(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const x = (clientX - rect.left) * (remoteWidth / rect.width);
      const y = (clientY - rect.top) * (remoteHeight / rect.height);
      return (x >= 0 && x <= remoteWidth && y >= 0 && y <= remoteHeight) 
        ? { x: Math.round(x), y: Math.round(y) } 
        : null;
    }

    function send(data) {
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'input', data }));
      }
    }

    canvas.addEventListener('mousemove', function(e) {
      const c = getCoords(e.clientX, e.clientY);
      if (c) send({ type: 'mousemove', x: c.x, y: c.y });
    });

    canvas.addEventListener('click', function(e) {
      e.preventDefault();
      const c = getCoords(e.clientX, e.clientY);
      if (c) send({ type: 'click', x: c.x, y: c.y, button: e.button === 0 ? 'left' : 'right' });
    });

    canvas.addEventListener('contextmenu', e => e.preventDefault());

    canvas.addEventListener('wheel', function(e) {
      e.preventDefault();
      send({ type: 'scroll', deltaY: e.deltaY });
    });

    document.addEventListener('keydown', function(e) {
      if (!connected || e.target === wsUrlInput) return;
      e.preventDefault();
      send({ type: 'key', key: e.key, down: true });
    });

    document.addEventListener('keyup', function(e) {
      if (!connected || e.target === wsUrlInput) return;
      e.preventDefault();
      send({ type: 'key', key: e.key, down: false });
    });
  </script>
</body>
</html>
